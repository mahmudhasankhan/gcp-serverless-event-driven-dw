version: 2

models:
  - name: stg_sales
    description: |
      Single staging model that replaces stg_raw_sales + stg_sales.

      Reads directly from raw_data.sales, casts and trims all columns,
      tags each row with a quality_issue reason, writes bad rows to
      quarantine.stg_sales_rejected_YYYYMMDD in BigQuery, and returns
      only clean rows downstream.

      Bad row conditions:
        - null order_id or customer_id
        - null or non-positive unit_price or quantity
        - null or negative revenue
        - shipped_date before order_date

    columns:
      - name: order_id
        description: "Order identifier — not unique, orders can have multiple products"
        tests:
          - not_null

      - name: order_date
        description: "Date the order was placed"
        tests:
          - not_null

      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null

      - name: customer_name
        description: "Customer company name"
        tests:
          - not_null

      - name: city
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: country
        tests:
          - not_null

      - name: sales_person
        tests:
          - not_null

      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['North', 'South', 'East', 'West']

      - name: shipped_date
        description: "Date order was shipped — always >= order_date after quarantine filter"
        tests:
          - not_null

      - name: shipper_name
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['Credit Card', 'Check', 'Cash']

      - name: product_name
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: unit_price
        description: "Always > 0 after quarantine filter"
        tests:
          - not_null

      - name: quantity
        description: "Always > 0 after quarantine filter"
        tests:
          - not_null

      - name: revenue
        description: "Always >= 0 after quarantine filter"
        tests:
          - not_null

      - name: shipping_fee
        tests:
          - not_null

      - name: batch_id
        description: "Monthly batch identifier — format batch_YYYY_MM"
        tests:
          - not_null

      - name: loaded_at
        description: "Timestamp of when the batch was loaded into BigQuery"
        tests:
          - not_null